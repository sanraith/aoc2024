<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advent of Code 2024 Solutions</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        h1,
        h2 {
            margin-top: 0;
            color: #03a9f4;
        }

        input,
        textarea,
        button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background-color: #333333;
            color: #ffffff;
            border: none;
            border-radius: 5px;
        }

        button {
            background-color: #03a9f4;
            cursor: pointer;
        }

        button:hover {
            background-color: #0288d1;
        }

        .card {
            position: relative;
            background-color: #1e1e1e;
            padding: 20px;
            margin: 0 0 20px 0;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .card-icons {
            position: absolute;
            top: 15px;
            right: 15px;
        }

        .card-icons span {
            font-size: 24px;
            margin-left: 10px;
            cursor: pointer;
        }

        .results-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            /* Align items to the top */
        }

        .result-text {
            font-family: 'Courier New', Courier, monospace;
            white-space: pre-wrap;
            /* Preserve whitespace for multiline text */
        }

        .run-solution-button {
            background-color: #03a9f4;
            color: #ffffff;
            border: none;
            border-radius: 5px;
            padding: 5px 10px;
            cursor: pointer;
            /* Limit horizontal size */
            max-width: 125px;
            padding: 25px 10px;
            white-space: nowrap;
            text-overflow: ellipsis;
            overflow: hidden;
        }

        .run-solution-button:hover {
            background-color: #0288d1;
        }

        .card.upcoming {
            background-color: #333333;
            color: #777777;
            position: relative;
            overflow: hidden;
            pointer-events: none;
            /* Disable interactions */
        }

        .card.upcoming::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(45deg, rgba(255, 255, 255, 0.1) 25%, transparent 25%, transparent 50%, rgba(255, 255, 255, 0.1) 50%, rgba(255, 255, 255, 0.1) 75%, transparent 75%, transparent);
            background-size: 50px 50px;
            pointer-events: none;
        }

        .card.upcoming::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            /* background: linear-gradient(to bottom, rgba(51, 51, 51, 0) 0%, #121212 100%); */
            pointer-events: none;
        }

        .card.upcoming .run-solution-button {
            cursor: default;
            background-color: #555555;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Advent of Code 2024 Solutions</h1>
        <div class="card">
            <div class="card-icons">
                <span title="Edit input">✏️</span>
                <span title="Go to source">🔗</span>
                <span title="Go to puzzle">🧩</span>
            </div>
            <h2>Day 1: Example title</h2>
            <h3>Results</h3>
            <div class="results-container">
                <div>
                    <p>Part 1: <span class="result-text" id="day1-part1-result">example result 1</span></p>
                    <p>Part 2: <span class="result-text" id="day1-part2-result">example result 2</span></p>
                </div>
                <button class="run-solution-button" id="run-day1-solution">Run Solution</button>
            </div>
        </div>
        <div class="card">
            <div class="card-icons">
                <span title="Edit input">✏️</span>
                <span title="Go to source">🔗</span>
                <span title="Go to puzzle">🧩</span>
            </div>
            <h2>Day 2: Example title</h2>
            <h3>Results</h3>
            <div class="results-container">
                <div>
                    <p>Part 1: <span class="result-text" id="day2-part1-result">example result 1</span></p>
                    <p>Part 2: <span class="result-text" id="day2-part2-result">example result 2 line 1<br>example
                            result 2 line 2</span></p>
                </div>
                <button class="run-solution-button" id="run-day2-solution">Run Solution</button>
            </div>
        </div>
        <div class="card upcoming">
            <h2>Day 3: Coming Soon</h2>
            <h3>Results</h3>
            <div class="results-container">
                <div>
                    <p>Part 1: <span class="result-text">---</span></p>
                    <p>Part 2: <span class="result-text">---</span></p>
                </div>
                <button class="run-solution-button" disabled>Run Solution</button>
            </div>
        </div>
    </div>
</body>

</html>
